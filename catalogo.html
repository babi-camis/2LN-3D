<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Completo - 2LN 3D</title>
  <link rel="icon" href="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" type="image/jpeg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans selection:bg-amber-700 selection:text-white min-h-screen flex flex-col">
  
  <div id="root" class="flex-1 flex flex-col"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- Ícones ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Menu = (p) => <IconWrapper {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconWrapper>;
    const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
    const ShoppingCart = (p) => <IconWrapper {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></IconWrapper>;
    const Filter = (p) => <IconWrapper {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconWrapper>;
    const Building2 = (p) => <IconWrapper {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></IconWrapper>;
    const Briefcase = (p) => <IconWrapper {...p}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const Instagram = (p) => <IconWrapper {...p}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></IconWrapper>;
    const MapPin = (p) => <IconWrapper {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Phone = (p) => <IconWrapper {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
    const Mail = (p) => <IconWrapper {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconWrapper>;

    function App() {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [categoriaFiltro, setCategoriaFiltro] = useState('Todos');
      const [ordenacao, setOrdenacao] = useState(''); // '' | 'menor' | 'maior'

      const formatarPreco = (valor) => `R$ ${valor.toFixed(2).replace('.', ',')}`;

      // Mock de dados que futuramente virá do painel admin
      const b2bProdutos = [
        { id: 1, nome: "Chaveiros com Logo (Lote 100un)", descricao: "Ideal para eventos e brindes de final de ano.", tag: "Brinde", img: "https://placehold.co/600x400/292524/a8a29e?text=Lote+Chaveiros" },
        { id: 2, nome: "Troféu Corporativo", descricao: "Premiações internas e hackathons. Design exclusivo.", tag: "Premiação", img: "https://placehold.co/600x400/292524/a8a29e?text=Trofeu+Personalizado" },
        { id: 3, nome: "Kit Organizador de Mesa", descricao: "Padronize o escritório com a identidade da marca.", tag: "Escritório", img: "https://placehold.co/600x400/292524/a8a29e?text=Kit+Escritorio" },
        { id: 4, nome: "Peças de Reposição Específicas", descricao: "Engrenagens e suportes mecânicos fora de linha.", tag: "Manutenção", img: "https://placehold.co/600x400/292524/a8a29e?text=Peca+Tecnica" },
      ];

      const todosProdutos = [
        { id: 101, nome: "Action Figure Cyberpunk", preco: 149.90, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Figure+Cyberpunk" },
        { id: 102, nome: "Suporte para Notebook", preco: 75.00, categoria: "Setup", img: "https://placehold.co/400x400/292524/a8a29e?text=Suporte+Notebook" },
        { id: 103, nome: "Luminária Lua 3D", preco: 89.90, categoria: "Decoração", img: "https://placehold.co/400x400/292524/a8a29e?text=Luminaria+Lua" },
        { id: 104, nome: "Vaso Cachepot", preco: 45.00, categoria: "Decoração", img: "https://placehold.co/400x400/292524/a8a29e?text=Vaso+Cachepot" },
        { id: 105, nome: "Suporte Headset RGB", preco: 60.00, categoria: "Setup", img: "https://placehold.co/400x400/292524/a8a29e?text=Suporte+RGB" },
        { id: 106, nome: "Miniatura RPG Orc", preco: 25.00, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Miniatura+Orc" },
        { id: 107, nome: "Organizador Gaveta", preco: 30.00, categoria: "Utilitário", img: "https://placehold.co/400x400/292524/a8a29e?text=Organizador" },
        { id: 108, nome: "Chaveiro Personalizado", preco: 15.00, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Chaveiro" },
        { id: 109, nome: "Vaso Geométrico", preco: 65.00, categoria: "Decoração", img: "https://placehold.co/400x400/292524/a8a29e?text=Vaso" },
        { id: 110, nome: "Action Figure Busto", preco: 120.00, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Busto" },
        { id: 111, nome: "Suporte Controle", preco: 35.00, categoria: "Setup", img: "https://placehold.co/400x400/292524/a8a29e?text=Controle" },
        { id: 112, nome: "Organizador Mesa", preco: 55.00, categoria: "Utilitário", img: "https://placehold.co/400x400/292524/a8a29e?text=Mesa" },
      ];

      const categoriasDisponiveis = ['Todos', 'Geek', 'Setup', 'Decoração', 'Utilitário', 'Soluções Empresariais'];
      
      const produtosFiltrados = useMemo(() => {
        let filtrados = todosProdutos.filter(p => categoriaFiltro === 'Todos' || p.categoria === categoriaFiltro);
        
        if (ordenacao === 'menor') {
          filtrados.sort((a, b) => a.preco - b.preco);
        } else if (ordenacao === 'maior') {
          filtrados.sort((a, b) => b.preco - a.preco);
        }

        return filtrados;
      }, [categoriaFiltro, ordenacao]);

      return (
        <React.Fragment>
          {/* Navegação Global */}
          <nav className="sticky top-0 z-50 bg-stone-950/90 backdrop-blur-md border-b border-stone-800 px-6 py-4 flex justify-between items-center transition-all duration-300">
            <div className="flex items-center gap-3">
              <a href="index.html">
                <img 
                  src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" 
                  alt="2LN 3D Logo" 
                  className="h-14 w-auto object-contain mix-blend-screen"
                  onError={(e) => {
                    e.target.onerror = null; 
                    e.target.src = "https://placehold.co/150x56/292524/a8a29e?text=2LN+3D+Logo";
                  }}
                />
              </a>
            </div>

            <div className="hidden lg:flex items-center gap-8 text-sm font-semibold text-stone-400">
              <a href="index.html#destaques" className="hover:text-amber-500 transition-colors">Destaques</a>
              <a href="index.html#diferencial" className="hover:text-amber-500 transition-colors">Diferenciais</a>
              <a href="#" className="text-amber-500 transition-colors">Catálogo Completo</a>
              <a href="index.html#solucoes-empresariais" className="text-amber-600 hover:text-amber-500 transition-colors flex items-center gap-1"><Building2 size={16}/> Soluções Empresariais</a>
              <a href="index.html#orcamento" className="hover:text-amber-500 transition-colors">Orçamentos</a>
            </div>

            <div className="hidden lg:flex items-center gap-6">
              <button className="text-stone-400 hover:text-amber-500 transition-colors relative">
                <ShoppingCart size={22} />
                <span className="absolute -top-2 -right-2 w-4 h-4 bg-amber-600 text-stone-50 text-[10px] rounded-full flex items-center justify-center font-bold">0</span>
              </button>
            </div>

            <button className="lg:hidden p-2 text-stone-400" onClick={() => setIsMenuOpen(!isMenuOpen)}>
              {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
            </button>
          </nav>

          {/* Menu Mobile */}
          {isMenuOpen && (
            <div className="lg:hidden fixed inset-0 top-[88px] z-40 bg-stone-950 border-b border-stone-800 px-6 py-4 flex flex-col gap-4">
                <a href="index.html#destaques" className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Destaques</a>
                <a href="index.html#diferencial" className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Diferenciais</a>
                <a href="#" className="text-lg font-semibold text-amber-500 transition-colors">Catálogo Completo</a>
                <a href="index.html#solucoes-empresariais" className="text-lg font-semibold text-amber-600 hover:text-amber-500 transition-colors flex items-center gap-2"><Building2 size={20}/> Soluções Empresariais</a>
                <a href="index.html#orcamento" className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Orçamentos</a>
            </div>
          )}

          {/* Container Principal do Catálogo */}
          <main className="flex-1 px-6 py-12 md:py-16 bg-stone-900">
            <div className="max-w-7xl mx-auto">
              
              {/* Header do Catálogo */}
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
                <div>
                  <h1 className="text-3xl md:text-4xl font-bold text-stone-50 mb-2">Catálogo Completo</h1>
                  <p className="text-stone-400">Explore todas as nossas peças disponíveis sob demanda.</p>
                </div>
                
                <div className="flex w-full md:w-64">
                  <select 
                    value={ordenacao}
                    onChange={(e) => setOrdenacao(e.target.value)}
                    className="bg-stone-950 border border-stone-800 text-stone-300 text-sm rounded-lg focus:ring-amber-500 focus:border-amber-500 block w-full p-3 outline-none cursor-pointer"
                    disabled={categoriaFiltro === 'Soluções Empresariais'}
                  >
                    <option value="">Ordenação Padrão</option>
                    <option value="menor">Menor Preço</option>
                    <option value="maior">Maior Preço</option>
                  </select>
                </div>
              </div>

              <div className="flex flex-col lg:flex-row gap-8">
                {/* Sidebar de Filtros */}
                <aside className="w-full lg:w-64 flex-shrink-0">
                  <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 lg:sticky lg:top-28">
                    <div className="flex items-center gap-2 mb-6">
                      <Filter size={20} className="text-amber-500" />
                      <h3 className="text-lg font-bold text-stone-50">Categorias</h3>
                    </div>
                    <div className="flex flex-col gap-2">
                      {categoriasDisponiveis.map(cat => (
                        <button 
                          key={cat}
                          onClick={() => setCategoriaFiltro(cat)}
                          className={`text-left px-4 py-2.5 rounded-lg text-sm transition-all ${
                            categoriaFiltro === cat 
                              ? 'bg-amber-900/20 text-amber-500 font-bold border border-amber-900/50' 
                              : 'text-stone-400 hover:text-stone-200 hover:bg-stone-800 border border-transparent'
                          }`}
                        >
                          {cat === 'Soluções Empresariais' ? (
                            <span className="flex items-center gap-2"><Briefcase size={14} /> {cat}</span>
                          ) : (
                            cat
                          )}
                        </button>
                      ))}
                    </div>
                  </div>
                </aside>

                {/* Grid de Produtos */}
                <section className="flex-1">
                  
                  {categoriaFiltro === 'Soluções Empresariais' ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {b2bProdutos.map((produto) => (
                        <div key={produto.id} className="bg-stone-950 rounded-xl border border-stone-800 p-4 md:p-6 flex flex-col md:flex-row gap-6 group hover:border-amber-700/50 transition-colors">
                          <div className="w-full md:w-48 aspect-video md:aspect-square bg-stone-900 rounded-lg flex items-center justify-center border border-stone-800 flex-shrink-0 overflow-hidden">
                            <img src={produto.img} alt={produto.tag} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" />
                          </div>
                          <div className="flex flex-col justify-center">
                            <span className="text-amber-600 text-xs font-bold uppercase tracking-wider mb-2">{produto.tag}</span>
                            <h3 className="font-bold text-xl text-stone-50 mb-2 group-hover:text-amber-500 transition-colors">{produto.nome}</h3>
                            <p className="text-stone-400 text-sm mb-4 leading-relaxed">{produto.descricao}</p>
                            <div>
                              <a href="index.html#orcamento" className="inline-flex items-center gap-1 text-sm font-bold text-stone-300 hover:text-stone-50 bg-stone-800 px-4 py-2 rounded transition-colors">
                                Solicitar Cotação <ChevronRight size={16} />
                              </a>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                      {produtosFiltrados.map((produto) => (
                        <div key={produto.id} className="bg-stone-950 rounded-lg border border-stone-800 overflow-hidden group flex flex-col hover:border-amber-700/50 transition-colors">
                          <div className="aspect-square bg-stone-900 relative flex items-center justify-center overflow-hidden">
                            <img src={produto.img} alt={produto.nome} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-80 group-hover:opacity-100" />
                            <div className="absolute top-2 right-2 bg-stone-950/90 text-stone-300 text-[10px] uppercase font-bold px-2 py-1 rounded border border-stone-800">
                              {produto.categoria}
                            </div>
                          </div>
                          <div className="p-4 flex-1 flex flex-col justify-between">
                            <div>
                              <h3 className="font-medium text-sm text-stone-200 line-clamp-2 mb-2 group-hover:text-amber-500 transition-colors">{produto.nome}</h3>
                            </div>
                            <div className="flex justify-between items-end mt-2">
                              <span className="font-bold text-lg text-stone-50">{formatarPreco(produto.preco)}</span>
                              <button className="w-8 h-8 flex items-center justify-center rounded bg-stone-800 hover:bg-amber-600 text-stone-300 hover:text-stone-50 transition-colors" title="Adicionar ao carrinho">
                                +
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Estado Vazio (quando um filtro não tem produtos) */}
                  {categoriaFiltro !== 'Soluções Empresariais' && produtosFiltrados.length === 0 && (
                    <div className="w-full py-20 flex flex-col items-center justify-center text-stone-500 bg-stone-950 rounded-xl border border-stone-800 border-dashed">
                      <Filter size={48} className="mb-4 opacity-50" />
                      <p className="text-lg">Nenhum produto encontrado nesta categoria.</p>
                      <button onClick={() => setCategoriaFiltro('Todos')} className="mt-4 text-amber-500 hover:underline">
                        Limpar Filtros
                      </button>
                    </div>
                  )}
                </section>
              </div>

            </div>
          </main>

          {/* Rodapé */}
          <footer className="bg-black text-stone-400 py-16 px-6 border-t border-stone-800 mt-auto">
            <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
              <div className="col-span-1 md:col-span-1">
                <div className="flex items-center gap-3 mb-6 text-stone-50">
                  <a href="index.html">
                    <img 
                      src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" 
                      alt="2LN 3D Logo" 
                      className="h-16 w-auto object-contain mix-blend-screen" 
                      onError={(e) => {
                        e.target.onerror = null; 
                        e.target.src = "https://placehold.co/150x56/292524/a8a29e?text=2LN+3D+Logo";
                      }}
                    />
                  </a>
                </div>
                <p className="text-sm text-stone-500 mb-6 leading-relaxed">
                  Estúdio de impressão 3D especializado em FDM. Focados em entregar durabilidade, precisão e soluções reais para clientes finais e empresas.
                </p>
                <div className="flex gap-4">
                  <a href="https://www.instagram.com/2ln3doficial" target="_blank" rel="noreferrer" className="w-10 h-10 rounded-full bg-stone-900 flex items-center justify-center text-stone-400 hover:text-amber-500 hover:bg-stone-800 transition-colors">
                    <Instagram size={20} />
                  </a>
                </div>
              </div>

              <div>
                <h4 className="text-stone-50 font-bold mb-6 uppercase tracking-wider text-sm">Loja</h4>
                <ul className="space-y-3 text-sm font-medium">
                  <li><a href="index.html#destaques" className="hover:text-amber-500 transition-colors">Mais Vendidos</a></li>
                  <li><a href="#" className="hover:text-amber-500 transition-colors">Catálogo Completo</a></li>
                  <li><a href="#" className="hover:text-amber-500 transition-colors">Acompanhar Pedido</a></li>
                  <li><a href="#" className="hover:text-amber-500 transition-colors">Trocas e Devoluções</a></li>
                </ul>
              </div>

              <div>
                <h4 className="text-stone-50 font-bold mb-6 uppercase tracking-wider text-sm">Soluções</h4>
                <ul className="space-y-3 text-sm font-medium">
                  <li><a href="index.html#solucoes-empresariais" className="hover:text-amber-500 transition-colors">Brindes Corporativos</a></li>
                  <li><a href="index.html#solucoes-empresariais" className="hover:text-amber-500 transition-colors">Peças de Reposição</a></li>
                  <li><a href="index.html#solucoes-empresariais" className="hover:text-amber-500 transition-colors">Prototipagem Rápida</a></li>
                </ul>
              </div>

              <div>
                <h4 className="text-stone-50 font-bold mb-6 uppercase tracking-wider text-sm">Contato</h4>
                <ul className="space-y-4 text-sm">
                  <li className="flex items-start gap-3">
                    <MapPin size={18} className="text-amber-600 mt-0.5 shrink-0" />
                    <span>Londrina, PR<br/><span className="text-stone-500">Enviamos para todo o Brasil</span></span>
                  </li>
                  <li className="flex items-center gap-3">
                    <Phone size={18} className="text-amber-600 shrink-0" />
                    <span>(43) 99999-9999</span>
                  </li>
                  <li className="flex items-center gap-3">
                    <Mail size={18} className="text-amber-600 shrink-0" />
                    <span>contato@2ln3d.com.br</span>
                  </li>
                </ul>
              </div>
            </div>
            
            <div className="max-w-7xl mx-auto border-t border-stone-800 pt-8 flex flex-col md:flex-row justify-between items-center text-xs text-stone-600 font-medium">
              <p>© {new Date().getFullYear()} 2LN 3D. Todos os direitos reservados.</p>
              <div className="flex gap-6 mt-4 md:mt-0">
                <span>CNPJ: 00.000.000/0000-00</span>
                <a href="#" className="hover:text-stone-400">Termos de Uso</a>
              </div>
            </div>
          </footer>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
