<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - 2LN 3D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-950 text-stone-200 min-h-screen flex items-center justify-center p-6">

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        setErro('');

        // Recupera os dados do armazenamento local
        const savedData = localStorage.getItem('2ln_userData');
        const user = savedData ? JSON.parse(savedData) : null;

        // Validação contra dados no cache
        if (user && user.email === email && user.senha === senha) {
          window.location.href = 'perfil.html';
        } else if (email === "demo@2ln3d.com.br" && senha === "123456") {
          // Credencial de teste inicial
          localStorage.setItem('2ln_userData', JSON.stringify({ nome: "Usuário Demo", email: "demo@2ln3d.com.br", senha: "123456" }));
          window.location.href = 'perfil.html';
        } else {
          setErro('E-mail ou palavra-passe incorretos.');
        }
      };

      return (
        <div className="w-full max-w-md bg-stone-900 border border-stone-800 rounded-2xl p-8 shadow-2xl">
          <div className="text-center mb-8">
            <h1 className="text-3xl font-bold text-white mb-2">Login</h1>
            <p className="text-stone-400">Aceda à sua conta 2LN 3D</p>
          </div>

          <form onSubmit={handleLogin} className="space-y-5">
            {erro && (
              <div className="bg-red-950/30 border border-red-800 text-red-400 text-sm p-3 rounded-lg text-center">
                {erro}
              </div>
            )}
            
            <div>
              <label className="block text-sm font-medium text-stone-400 mb-1.5">E-mail</label>
              <input 
                type="email" 
                required
                className="w-full bg-stone-950 border border-stone-800 rounded-lg p-3 outline-none focus:border-amber-600 transition-all"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
            </div>

            <div>
              <label className="block text-sm font-medium text-stone-400 mb-1.5">Palavra-passe</label>
              <input 
                type="password" 
                required
                className="w-full bg-stone-950 border border-stone-800 rounded-lg p-3 outline-none focus:border-amber-600 transition-all"
                value={senha}
                onChange={(e) => setSenha(e.target.value)}
              />
            </div>

            <button 
              type="submit" 
              className="w-full bg-amber-700 hover:bg-amber-600 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-[1.01] active:scale-[0.98]"
            >
              Entrar
            </button>
          </form>

          <div className="mt-6 text-center text-sm">
            <span className="text-stone-500">Ainda não tem conta? </span>
            <a href="registro.html" className="text-amber-500 font-bold hover:underline">Criar conta</a>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
