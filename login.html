<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso - 2LN 3D</title>
  <link rel="icon" href="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" type="image/jpeg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans selection:bg-amber-700 selection:text-white min-h-screen flex items-center justify-center p-4">
  
  <div id="root" class="w-full max-w-md"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Mail = (p) => <IconWrapper {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconWrapper>;
    const Lock = (p) => <IconWrapper {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconWrapper>;
    const User = (p) => <IconWrapper {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const ArrowLeft = (p) => <IconWrapper {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;

    const InputField = ({ icon: Icon, label, type = "text", placeholder, value, onChange }) => (
      <div className="flex flex-col gap-1.5 mb-4">
        <label className="text-sm font-medium text-stone-400">{label}</label>
        <div className="relative">
          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-stone-500">
            <Icon size={18} />
          </div>
          <input 
            type={type} 
            placeholder={placeholder} 
            value={value}
            onChange={onChange}
            required
            className="bg-stone-900 border border-stone-800 text-stone-200 rounded-lg pl-10 pr-3 py-3 w-full outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all"
          />
        </div>
      </div>
    );

    function App() {
      const [isLogin, setIsLogin] = useState(true);
      
      const [nome, setNome] = useState('');
      const [email, setEmail] = useState('');
      const [senha, setSenha] = useState('');
      const [erro, setErro] = useState('');
      const [isChecking, setIsChecking] = useState(true);

      // Verifica se o utilizador já está autenticado no cache
      useEffect(() => {
        try {
          const userData = localStorage.getItem('2ln_userData');
          if (userData) {
            window.location.href = 'perfil.html';
          } else {
            setIsChecking(false);
          }
        } catch (error) {
          console.warn("Leitura do localStorage bloqueada.", error);
          setIsChecking(false);
        }
      }, []);

      const handleSubmit = (e) => {
        e.preventDefault();
        setErro('');
        
        try {
          if (!isLogin) {
            // Lógica de Registo: Guarda os dados exatos inseridos
            const newUser = { nome, email, senha };
            localStorage.setItem('2ln_userData', JSON.stringify(newUser));
            window.location.href = 'perfil.html';
          } else {
            // Lógica de Login: Verifica se corresponde aos dados guardados
            const savedData = localStorage.getItem('2ln_userData');
            const user = savedData ? JSON.parse(savedData) : null;

            if (user && user.email === email && user.senha === senha) {
              window.location.href = 'perfil.html';
            } else if (email === "demo@2ln3d.com.br" && senha === "123456") {
              // Conta Demo para testes rápidos
              localStorage.setItem('2ln_userData', JSON.stringify({ nome: "Utilizador Demo", email, senha }));
              window.location.href = 'perfil.html';
            } else {
              setErro('E-mail ou palavra-passe incorretos.');
            }
          }
        } catch (error) {
          // Contorna bloqueios de segurança do ambiente de preview
          console.warn("Gravação no localStorage bloqueada.", error);
          window.location.href = 'perfil.html';
        }
      };

      const toggleMode = (mode) => {
        setIsLogin(mode);
        setErro('');
        setSenha('');
      };

      if (isChecking) return null; // Evita piscar o ecrã enquanto verifica o cache

      return (
        <div className="bg-stone-950 border border-stone-800 rounded-2xl shadow-2xl overflow-hidden relative w-full">
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-amber-900/20 via-stone-950/0 to-transparent pointer-events-none"></div>
          
          <div className="p-6 md:p-8 relative z-10">
            <div className="flex items-center justify-between mb-8">
              <a href="index.html" className="text-stone-500 hover:text-stone-300 transition-colors flex items-center gap-2 text-sm font-medium">
                <ArrowLeft size={16} /> Voltar
              </a>
              <img 
                src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" 
                alt="2LN 3D Logo" 
                className="h-10 w-auto object-contain mix-blend-screen"
                onError={(e) => {
                  e.target.onerror = null; 
                  e.target.src = "https://placehold.co/100x40/292524/a8a29e?text=2LN";
                }}
              />
            </div>

            {/* Alternador Login / Registo */}
            <div className="flex bg-stone-900 p-1 rounded-lg border border-stone-800 mb-8">
              <button 
                onClick={() => toggleMode(true)}
                type="button"
                className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${isLogin ? 'bg-stone-800 text-stone-50 shadow' : 'text-stone-400 hover:text-stone-200'}`}
              >
                Entrar
              </button>
              <button 
                onClick={() => toggleMode(false)}
                type="button"
                className={`flex-1 py-2 text-sm font-bold rounded-md transition-all ${!isLogin ? 'bg-stone-800 text-stone-50 shadow' : 'text-stone-400 hover:text-stone-200'}`}
              >
                Criar Conta
              </button>
            </div>

            <form onSubmit={handleSubmit}>
              <div className="min-h-[280px]">
                {erro && (
                  <div className="bg-red-950/30 border border-red-800 text-red-400 text-sm p-3 rounded-lg text-center mb-4">
                    {erro}
                  </div>
                )}

                {isLogin ? (
                  <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <h2 className="text-2xl font-bold text-stone-50 mb-2">Bem-vindo de volta</h2>
                    <p className="text-stone-400 text-sm mb-6">Insira os seus dados para aceder à sua conta.</p>
                    
                    <InputField 
                      icon={Mail} 
                      label="E-mail" 
                      type="email" 
                      placeholder="seu@email.com" 
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                    />
                    <InputField 
                      icon={Lock} 
                      label="Palavra-passe" 
                      type="password" 
                      placeholder="••••••••" 
                      value={senha}
                      onChange={(e) => setSenha(e.target.value)}
                    />
                    
                    <div className="flex justify-end mb-6">
                      <a href="#" className="text-sm font-medium text-amber-600 hover:text-amber-500 transition-colors">
                        Esqueceu a palavra-passe?
                      </a>
                    </div>
                  </div>
                ) : (
                  <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <h2 className="text-2xl font-bold text-stone-50 mb-2">Criar nova conta</h2>
                    <p className="text-stone-400 text-sm mb-6">Preencha os dados abaixo para iniciar o seu registo.</p>
                    
                    <InputField 
                      icon={User} 
                      label="Nome Completo" 
                      placeholder="João da Silva" 
                      value={nome}
                      onChange={(e) => setNome(e.target.value)}
                    />
                    <InputField 
                      icon={Mail} 
                      label="E-mail" 
                      type="email" 
                      placeholder="seu@email.com"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                    />
                    <InputField 
                      icon={Lock} 
                      label="Palavra-passe" 
                      type="password" 
                      placeholder="Crie uma palavra-passe forte"
                      value={senha}
                      onChange={(e) => setSenha(e.target.value)}
                    />
                  </div>
                )}
              </div>

              <button type="submit" className="w-full bg-amber-700 hover:bg-amber-600 text-stone-50 py-3 rounded-lg font-bold transition-colors mt-2 shadow-[0_0_15px_rgba(180,83,9,0.2)]">
                {isLogin ? 'Aceder à Conta' : 'Finalizar Registo'}
              </button>
            </form>

            <div className="flex items-center my-6">
              <div className="flex-1 border-t border-stone-800"></div>
              <span className="px-3 text-stone-500 text-sm">ou</span>
              <div className="flex-1 border-t border-stone-800"></div>
            </div>

            <button type="button" className="w-full bg-stone-900 border border-stone-800 hover:bg-stone-800 text-stone-300 hover:text-stone-50 py-3 rounded-lg font-medium transition-colors flex items-center justify-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" className="fill-current">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continuar com Google
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
