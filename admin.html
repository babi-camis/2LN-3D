<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - 2LN 3D</title>
  <link rel="icon" href="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" type="image/jpeg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans selection:bg-amber-700 selection:text-white min-h-screen flex">
  
  <div id="root" class="flex-1 flex w-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const LayoutDashboard = (p) => <IconWrapper {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconWrapper>;
    const Package = (p) => <IconWrapper {...p}><line x1="16.5" x2="7.5" y1="9.4" y2="14.6"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></IconWrapper>;
    const FileText = (p) => <IconWrapper {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></IconWrapper>;
    const Tag = (p) => <IconWrapper {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></IconWrapper>;
    const LogOut = (p) => <IconWrapper {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></IconWrapper>;
    const Search = (p) => <IconWrapper {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconWrapper>;
    const Plus = (p) => <IconWrapper {...p}><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></IconWrapper>;
    const Edit = (p) => <IconWrapper {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></IconWrapper>;
    const Trash2 = (p) => <IconWrapper {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconWrapper>;
    const MenuIcon = (p) => <IconWrapper {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconWrapper>;
    const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
    const MessageSquare = (p) => <IconWrapper {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconWrapper>;

    const Badge = ({ children, type }) => {
      const colors = {
        success: "bg-green-900/30 text-green-500 border-green-900/50",
        warning: "bg-amber-900/30 text-amber-500 border-amber-900/50",
        danger: "bg-red-900/30 text-red-500 border-red-900/50",
        neutral: "bg-stone-800 text-stone-300 border-stone-700"
      };
      return (
        <span className={`px-2.5 py-1 rounded-full text-xs font-bold border ${colors[type]}`}>
          {children}
        </span>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('pedidos');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState(''); // 'produto' ou 'cupom'

      const formatarPreco = (valor) => `R$ ${valor.toFixed(2).replace('.', ',')}`;

      // --- MOCKS DE DADOS ---
      const [pedidos] = useState([
        { id: '#1045', cliente: 'João da Silva', data: '16/07/2026', status: 'Em Produção', total: 145.90 },
        { id: '#1046', cliente: 'Maria Oliveira', data: '16/07/2026', status: 'Pagamento Pendente', total: 89.90 },
        { id: '#1044', cliente: 'Empresa XYZ', data: '14/07/2026', status: 'Entregue', total: 1250.00 },
      ]);

      const [orcamentos] = useState([
        { id: '#ORC-090', cliente: 'Carlos Santos', projeto: 'Peça de reposição', status: 'Novo', data: '16/07/2026' },
        { id: '#ORC-089', cliente: 'Tech Solutions B2B', projeto: 'Lote 100 Troféus', status: 'Em Negociação', data: '15/07/2026' },
      ]);

      const [produtos] = useState([
        { id: 101, nome: "Action Figure Cyberpunk", preco: 149.90, estoque: 15, categoria: "Geek" },
        { id: 102, nome: "Suporte para Notebook", preco: 75.00, estoque: 8, categoria: "Setup" },
        { id: 103, nome: "Luminária Lua 3D", preco: 89.90, estoque: 0, categoria: "Decoração" },
      ]);

      const [cupons] = useState([
        { id: 1, codigo: 'BEMVINDO10', desconto: '10%', usos: 45, validade: '31/12/2026', status: 'Ativo' },
        { id: 2, codigo: 'FRETEGRATIS', desconto: 'Frete', usos: 12, validade: '31/07/2026', status: 'Ativo' },
        { id: 3, codigo: 'BLACKFRIDAY', desconto: '30%', usos: 150, validade: '30/11/2025', status: 'Expirado' },
      ]);

      // --- RENDERIZADORES DE ABAS ---
      
      const renderPedidos = () => (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <div>
              <h2 className="text-2xl font-bold text-stone-50">Gestão de Pedidos</h2>
              <p className="text-stone-400 text-sm">Acompanhe e atualize o status das vendas.</p>
            </div>
            <div className="relative">
              <Search size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500" />
              <input type="text" placeholder="Buscar pedido..." className="bg-stone-900 border border-stone-800 text-stone-200 rounded-lg pl-10 pr-4 py-2 text-sm focus:border-amber-600 outline-none" />
            </div>
          </div>

          <div className="bg-stone-900 border border-stone-800 rounded-xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left text-sm">
                <thead className="bg-stone-950 border-b border-stone-800 text-stone-400">
                  <tr>
                    <th className="p-4 font-medium">Pedido</th>
                    <th className="p-4 font-medium">Data</th>
                    <th className="p-4 font-medium">Cliente</th>
                    <th className="p-4 font-medium">Total</th>
                    <th className="p-4 font-medium">Status</th>
                    <th className="p-4 font-medium text-right">Ações</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-stone-800">
                  {pedidos.map(p => (
                    <tr key={p.id} className="hover:bg-stone-800/50 transition-colors">
                      <td className="p-4 font-bold text-stone-200">{p.id}</td>
                      <td className="p-4 text-stone-400">{p.data}</td>
                      <td className="p-4 text-stone-300">{p.cliente}</td>
                      <td className="p-4 text-amber-500 font-bold">{formatarPreco(p.total)}</td>
                      <td className="p-4">
                        <Badge type={p.status === 'Entregue' ? 'success' : p.status === 'Em Produção' ? 'warning' : 'neutral'}>
                          {p.status}
                        </Badge>
                      </td>
                      <td className="p-4 text-right">
                        <button className="text-stone-400 hover:text-amber-500 transition-colors p-1"><Edit size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

      const renderOrcamentos = () => (
        <div className="space-y-6">
          <div className="flex justify-between items-center">
            <div>
              <h2 className="text-2xl font-bold text-stone-50">Orçamentos Recebidos</h2>
              <p className="text-stone-400 text-sm">Responda a solicitações de projetos personalizados e B2B.</p>
            </div>
          </div>

          <div className="grid grid-cols-1 gap-4">
            {orcamentos.map(orc => (
              <div key={orc.id} className="bg-stone-900 border border-stone-800 rounded-xl p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-stone-700 transition-colors">
                <div>
                  <div className="flex items-center gap-3 mb-1">
                    <span className="font-bold text-stone-200">{orc.id}</span>
                    <Badge type={orc.status === 'Novo' ? 'success' : 'warning'}>{orc.status}</Badge>
                    <span className="text-stone-500 text-xs">{orc.data}</span>
                  </div>
                  <h3 className="text-stone-400 text-sm">Projeto: <span className="text-stone-300 font-medium">{orc.projeto}</span></h3>
                  <p className="text-stone-500 text-sm">Cliente: {orc.cliente}</p>
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <button className="flex-1 md:flex-none bg-stone-800 hover:bg-stone-700 text-stone-200 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2 border border-stone-700">
                    <Edit size={16} /> Detalhes
                  </button>
                  <button className="flex-1 md:flex-none bg-amber-700 hover:bg-amber-600 text-stone-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2">
                    <MessageSquare size={16} /> Responder
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      const renderProdutos = () => (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-stone-50">Estoque e Produtos</h2>
              <p className="text-stone-400 text-sm">Faça a gestão do catálogo do varejo.</p>
            </div>
            <button 
              onClick={() => { setModalType('produto'); setIsModalOpen(true); }}
              className="bg-amber-700 hover:bg-amber-600 text-stone-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2 w-full sm:w-auto justify-center"
            >
              <Plus size={18} /> Novo Produto
            </button>
          </div>

          <div className="bg-stone-900 border border-stone-800 rounded-xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left text-sm">
                <thead className="bg-stone-950 border-b border-stone-800 text-stone-400">
                  <tr>
                    <th className="p-4 font-medium">ID</th>
                    <th className="p-4 font-medium">Produto</th>
                    <th className="p-4 font-medium">Categoria</th>
                    <th className="p-4 font-medium">Preço</th>
                    <th className="p-4 font-medium">Estoque</th>
                    <th className="p-4 font-medium text-right">Ações</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-stone-800">
                  {produtos.map(p => (
                    <tr key={p.id} className="hover:bg-stone-800/50 transition-colors">
                      <td className="p-4 text-stone-500">#{p.id}</td>
                      <td className="p-4 font-bold text-stone-200">{p.nome}</td>
                      <td className="p-4 text-stone-400">{p.categoria}</td>
                      <td className="p-4 text-amber-500 font-bold">{formatarPreco(p.preco)}</td>
                      <td className="p-4">
                        <Badge type={p.estoque > 5 ? 'success' : p.estoque > 0 ? 'warning' : 'danger'}>
                          {p.estoque} un
                        </Badge>
                      </td>
                      <td className="p-4 text-right flex justify-end gap-2">
                        <button className="text-stone-400 hover:text-blue-500 transition-colors p-1"><Edit size={18}/></button>
                        <button className="text-stone-400 hover:text-red-500 transition-colors p-1"><Trash2 size={18}/></button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

      const renderCupons = () => (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-stone-50">Cupons e Promoções</h2>
              <p className="text-stone-400 text-sm">Crie códigos de desconto para o checkout.</p>
            </div>
            <button 
              onClick={() => { setModalType('cupom'); setIsModalOpen(true); }}
              className="bg-amber-700 hover:bg-amber-600 text-stone-50 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2 w-full sm:w-auto justify-center"
            >
              <Plus size={18} /> Novo Cupom
            </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {cupons.map(c => (
              <div key={c.id} className="bg-stone-900 border border-stone-800 rounded-xl p-5 flex flex-col justify-between hover:border-stone-700 transition-colors">
                <div className="flex justify-between items-start mb-4">
                  <div className="bg-stone-950 border border-stone-800 px-3 py-1 rounded font-mono font-bold text-amber-500 text-lg tracking-wider">
                    {c.codigo}
                  </div>
                  <Badge type={c.status === 'Ativo' ? 'success' : 'danger'}>{c.status}</Badge>
                </div>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between">
                    <span className="text-stone-500">Desconto:</span>
                    <span className="text-stone-200 font-bold">{c.desconto}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-stone-500">Validade:</span>
                    <span className="text-stone-300">{c.validade}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-stone-500">Usos:</span>
                    <span className="text-stone-300">{c.usos}x</span>
                  </div>
                </div>
                <div className="mt-4 pt-4 border-t border-stone-800 flex justify-end gap-2">
                  <button className="text-stone-400 hover:text-red-500 transition-colors p-1"><Trash2 size={18}/></button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      return (
        <div className="flex flex-col md:flex-row w-full min-h-screen">
          
          {/* Mobile Header */}
          <div className="md:hidden flex items-center justify-between p-4 bg-stone-950 border-b border-stone-800 sticky top-0 z-20">
            <img src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" alt="Logo" className="h-8 object-contain mix-blend-screen" onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x40/292524/a8a29e?text=Admin"; }} />
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-stone-400">
              {isMobileMenuOpen ? <X size={24} /> : <MenuIcon size={24} />}
            </button>
          </div>

          {/* Sidebar */}
          <aside className={`${isMobileMenuOpen ? 'block' : 'hidden'} md:block w-full md:w-64 bg-stone-950 border-r border-stone-800 flex flex-col fixed md:sticky top-[65px] md:top-0 h-[calc(100vh-65px)] md:h-screen z-10 overflow-y-auto`}>
            <div className="p-6 hidden md:flex items-center justify-center border-b border-stone-800">
              <img src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" alt="Logo" className="h-12 object-contain mix-blend-screen" onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/120x40/292524/a8a29e?text=2LN+Admin"; }} />
            </div>
            
            <div className="p-4 border-b border-stone-800 flex items-center gap-3">
              <div className="w-10 h-10 bg-amber-900/40 rounded-full flex items-center justify-center text-amber-500 border border-amber-700/30">
                A
              </div>
              <div>
                <p className="text-sm font-bold text-stone-200">Administrador</p>
                <p className="text-xs text-stone-500">Painel de Controlo</p>
              </div>
            </div>

            <nav className="flex-1 p-4 space-y-1">
              {[
                { id: 'pedidos', label: 'Pedidos', icon: Package },
                { id: 'orcamentos', label: 'Orçamentos', icon: FileText },
                { id: 'produtos', label: 'Estoque / Produtos', icon: LayoutDashboard },
                { id: 'cupons', label: 'Cupons e Promoções', icon: Tag },
              ].map(item => {
                const Icon = item.icon;
                const isActive = activeTab === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${
                      isActive 
                        ? 'bg-amber-900/20 text-amber-500 font-bold border border-amber-900/50' 
                        : 'text-stone-400 hover:text-stone-200 hover:bg-stone-900 border border-transparent'
                    }`}
                  >
                    <Icon size={18} /> {item.label}
                  </button>
                )
              })}
            </nav>

            <div className="p-4 border-t border-stone-800">
              <a href="index.html" className="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-stone-500 hover:text-stone-300 transition-colors">
                <LogOut size={18} /> Sair do Painel
              </a>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 bg-stone-950 p-6 md:p-10 overflow-y-auto min-h-screen">
            <div className="max-w-6xl mx-auto">
              {activeTab === 'pedidos' && renderPedidos()}
              {activeTab === 'orcamentos' && renderOrcamentos()}
              {activeTab === 'produtos' && renderProdutos()}
              {activeTab === 'cupons' && renderCupons()}
            </div>
          </main>

          {/* Modal Generico para Formulários */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
              <div className="bg-stone-900 border border-stone-800 rounded-xl w-full max-w-lg shadow-2xl animate-in fade-in zoom-in duration-200">
                <div className="p-5 border-b border-stone-800 flex justify-between items-center">
                  <h3 className="font-bold text-stone-50 text-lg">
                    {modalType === 'produto' ? 'Cadastrar Novo Produto' : 'Criar Novo Cupom'}
                  </h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-stone-400 hover:text-white">
                    <X size={20} />
                  </button>
                </div>
                
                <div className="p-6 space-y-4">
                  {modalType === 'produto' ? (
                    <>
                      <div className="space-y-1">
                        <label className="text-sm font-medium text-stone-400">Nome do Produto</label>
                        <input type="text" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 outline-none focus:border-amber-600" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="text-sm font-medium text-stone-400">Preço (R$)</label>
                          <input type="number" step="0.01" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 outline-none focus:border-amber-600" />
                        </div>
                        <div className="space-y-1">
                          <label className="text-sm font-medium text-stone-400">Estoque</label>
                          <input type="number" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 outline-none focus:border-amber-600" />
                        </div>
                      </div>
                      <div className="space-y-1">
                        <label className="text-sm font-medium text-stone-400">Categoria</label>
                        <select className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 outline-none focus:border-amber-600">
                          <option>Geek</option><option>Setup</option><option>Decoração</option><option>Utilitário</option>
                        </select>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="space-y-1">
                        <label className="text-sm font-medium text-stone-400">Código do Cupom (Ex: BEMVINDO10)</label>
                        <input type="text" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 font-mono uppercase outline-none focus:border-amber-600" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="text-sm font-medium text-stone-400">Desconto (% ou Valor)</label>
                          <input type="text" placeholder="Ex: 10% ou 50.00" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-200 outline-none focus:border-amber-600" />
                        </div>
                        <div className="space-y-1">
                          <label className="text-sm font-medium text-stone-400">Validade</label>
                          <input type="date" className="w-full bg-stone-950 border border-stone-800 rounded-lg p-2.5 text-stone-400 outline-none focus:border-amber-600" />
                        </div>
                      </div>
                    </>
                  )}
                </div>
                
                <div className="p-5 border-t border-stone-800 bg-stone-950/50 flex justify-end gap-3 rounded-b-xl">
                  <button onClick={() => setIsModalOpen(false)} className="px-5 py-2 rounded-lg text-sm font-bold text-stone-400 hover:text-stone-200 transition-colors">Cancelar</button>
                  <button onClick={() => setIsModalOpen(false)} className="bg-amber-700 hover:bg-amber-600 text-stone-50 px-6 py-2 rounded-lg text-sm font-bold transition-colors">Gravar</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
