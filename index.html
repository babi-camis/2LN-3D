<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2LN 3D - Impressão 3D e Soluções Empresariais</title>
  <link rel="icon" href="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" type="image/jpeg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans selection:bg-amber-700 selection:text-white min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Menu = (p) => <IconWrapper {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconWrapper>;
    const X = (p) => <IconWrapper {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;
    const ShoppingCart = (p) => <IconWrapper {...p}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></IconWrapper>;
    const User = (p) => <IconWrapper {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconWrapper>;
    const Printer = (p) => <IconWrapper {...p}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></IconWrapper>;
    const ShieldCheck = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const Zap = (p) => <IconWrapper {...p}><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></IconWrapper>;
    const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const ArrowRight = (p) => <IconWrapper {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconWrapper>;
    const Building2 = (p) => <IconWrapper {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></IconWrapper>;
    const Briefcase = (p) => <IconWrapper {...p}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
    const Instagram = (p) => <IconWrapper {...p}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></IconWrapper>;
    const MapPin = (p) => <IconWrapper {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Phone = (p) => <IconWrapper {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></IconWrapper>;
    const Mail = (p) => <IconWrapper {...p}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></IconWrapper>;
    const Trash2 = (p) => <IconWrapper {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconWrapper>;
    const Plus = (p) => <IconWrapper {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
    const Minus = (p) => <IconWrapper {...p}><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
    const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;

    function App() {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [toast, setToast] = useState(null);
      const [cart, setCart] = useState([]);

      // Inicializar carrinho e sincronizar entre abas
      useEffect(() => {
        const savedCart = localStorage.getItem('2ln_cart');
        if (savedCart) {
          try { setCart(JSON.parse(savedCart)); } catch(e) {}
        }

        const handleStorageChange = (e) => {
          if (e.key === '2ln_cart') {
            try { setCart(JSON.parse(e.newValue) || []); } catch(err) {}
          }
        };

        window.addEventListener('storage', handleStorageChange);
        return () => window.removeEventListener('storage', handleStorageChange);
      }, []);

      // Atualizar localStorage sempre que o carrinho mudar
      useEffect(() => {
        localStorage.setItem('2ln_cart', JSON.stringify(cart));
      }, [cart]);

      const formatarPreco = (valor) => `R$ ${valor.toFixed(2).replace('.', ',')}`;
      const cartTotalItens = cart.reduce((acc, item) => acc + item.qtd, 0);
      const cartSubtotal = cart.reduce((acc, item) => acc + (item.preco * item.qtd), 0);

      const showToast = (mensagem) => {
        setToast(mensagem);
        setTimeout(() => setToast(null), 3000);
      };

      const handleAddToCart = (produto) => {
        setCart(prev => {
          const existe = prev.find(p => p.id === produto.id);
          if (existe) {
            return prev.map(p => p.id === produto.id ? { ...p, qtd: p.qtd + 1 } : p);
          }
          return [...prev, { ...produto, qtd: 1 }];
        });
        showToast(`${produto.nome} adicionado ao carrinho!`);
      };

      const handleRemoveFromCart = (id) => {
        setCart(prev => prev.filter(p => p.id !== id));
      };

      const handleUpdateQtd = (id, delta) => {
        setCart(prev => prev.map(p => {
          if (p.id === id) {
            const novaQtd = p.qtd + delta;
            return novaQtd > 0 ? { ...p, qtd: novaQtd } : p;
          }
          return p;
        }));
      };

      // --- DADOS DA HOME ---
      const previewProdutos = [
        { id: 101, nome: "Action Figure Cyberpunk", preco: 149.90, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Figure+Cyberpunk" },
        { id: 102, nome: "Suporte para Notebook", preco: 75.00, categoria: "Setup", img: "https://placehold.co/400x400/292524/a8a29e?text=Suporte+Notebook" },
        { id: 103, nome: "Luminária Lua 3D", preco: 89.90, categoria: "Decoração", img: "https://placehold.co/400x400/292524/a8a29e?text=Luminaria+Lua" },
        { id: 104, nome: "Vaso Cachepot", preco: 45.00, categoria: "Decoração", img: "https://placehold.co/400x400/292524/a8a29e?text=Vaso+Cachepot" },
        { id: 105, nome: "Suporte Headset RGB", preco: 60.00, categoria: "Setup", img: "https://placehold.co/400x400/292524/a8a29e?text=Suporte+RGB" },
        { id: 106, nome: "Miniatura RPG Orc", preco: 25.00, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Miniatura+Orc" },
        { id: 107, nome: "Organizador Gaveta", preco: 30.00, categoria: "Utilitário", img: "https://placehold.co/400x400/292524/a8a29e?text=Organizador" },
        { id: 108, nome: "Chaveiro Personalizado", preco: 15.00, categoria: "Geek", img: "https://placehold.co/400x400/292524/a8a29e?text=Chaveiro" },
      ];

      return (
        <React.Fragment>
          {/* NAVEGAÇÃO GLOBAL */}
          <nav className="sticky top-0 z-40 bg-stone-950/90 backdrop-blur-md border-b border-stone-800 px-6 py-4 flex justify-between items-center transition-all duration-300">
            <div className="flex items-center gap-3">
              <a href="#">
                <img 
                  src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" 
                  alt="2LN 3D Logo" 
                  className="h-14 w-auto object-contain mix-blend-screen"
                  onError={(e) => {
                    e.target.onerror = null; 
                    e.target.src = "https://placehold.co/150x56/292524/a8a29e?text=2LN+3D+Logo";
                  }}
                />
              </a>
            </div>

            <div className="hidden lg:flex items-center gap-8 text-sm font-semibold text-stone-400">
              <a href="#destaques" className="hover:text-amber-500 transition-colors">Destaques</a>
              <a href="#diferencial" className="hover:text-amber-500 transition-colors">Diferenciais</a>
              <a href="catalogo.html" className="hover:text-amber-500 transition-colors">Catálogo Completo</a>
              <a href="#solucoes-empresariais" className="text-amber-600 hover:text-amber-500 transition-colors flex items-center gap-1"><Building2 size={16}/> Soluções Empresariais</a>
              <a href="orcamento.html" className="hover:text-amber-500 transition-colors">Orçamentos</a>
            </div>

            <div className="hidden lg:flex items-center gap-6">
              <a href="perfil.html" className="text-stone-400 hover:text-amber-500 transition-colors" title="Meu Perfil">
                <User size={22} />
              </a>
              <button onClick={() => setIsCartOpen(true)} className="text-stone-400 hover:text-amber-500 transition-colors relative" title="Carrinho de Compras">
                <ShoppingCart size={22} />
                {cartTotalItens > 0 && (
                  <span className="absolute -top-2 -right-2 w-4 h-4 bg-amber-600 text-stone-50 text-[10px] rounded-full flex items-center justify-center font-bold">
                    {cartTotalItens}
                  </span>
                )}
              </button>
            </div>

            <div className="lg:hidden flex items-center gap-4">
              <a href="perfil.html" className="text-stone-400 hover:text-amber-500 transition-colors">
                <User size={22} />
              </a>
              <button onClick={() => setIsCartOpen(true)} className="text-stone-400 hover:text-amber-500 transition-colors relative">
                <ShoppingCart size={22} />
                {cartTotalItens > 0 && (
                  <span className="absolute -top-2 -right-2 w-4 h-4 bg-amber-600 text-stone-50 text-[10px] rounded-full flex items-center justify-center font-bold">
                    {cartTotalItens}
                  </span>
                )}
              </button>
              <button className="p-2 text-stone-400" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
              </button>
            </div>
          </nav>

          {/* Menu Mobile */}
          {isMenuOpen && (
            <div className="lg:hidden fixed inset-0 top-[88px] z-30 bg-stone-950 border-b border-stone-800 px-6 py-4 flex flex-col gap-4">
                <a href="#destaques" onClick={() => setIsMenuOpen(false)} className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Destaques</a>
                <a href="#diferencial" onClick={() => setIsMenuOpen(false)} className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Diferenciais</a>
                <a href="catalogo.html" className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Catálogo Completo</a>
                <a href="#solucoes-empresariais" onClick={() => setIsMenuOpen(false)} className="text-lg font-semibold text-amber-600 hover:text-amber-500 transition-colors flex items-center gap-2"><Building2 size={20}/> Soluções Empresariais</a>
                <a href="orcamento.html" className="text-lg font-semibold text-stone-400 hover:text-amber-500 transition-colors">Orçamentos</a>
            </div>
          )}

          {/* Menu Lateral do Carrinho (Drawer) */}
          <div className={`fixed inset-0 z-50 transition-opacity duration-300 ${isCartOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
            <div className={`absolute top-0 right-0 w-full sm:w-[400px] h-full bg-stone-950 border-l border-stone-800 shadow-2xl flex flex-col transition-transform duration-300 ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
              
              {/* Header Carrinho */}
              <div className="p-6 border-b border-stone-800 flex justify-between items-center bg-stone-900/50">
                <h2 className="text-xl font-bold text-stone-50 flex items-center gap-2">
                  <ShoppingCart size={24} className="text-amber-500"/> Carrinho
                </h2>
                <button onClick={() => setIsCartOpen(false)} className="text-stone-400 hover:text-white transition-colors">
                  <X size={24} />
                </button>
              </div>

              {/* Itens do Carrinho */}
              <div className="flex-1 overflow-y-auto p-6 space-y-4">
                {cart.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-stone-500 space-y-4">
                    <ShoppingCart size={48} className="opacity-20" />
                    <p>O seu carrinho está vazio.</p>
                    <button onClick={() => setIsCartOpen(false)} className="text-amber-500 font-bold hover:underline">Continuar a explorar</button>
                  </div>
                ) : (
                  cart.map(item => (
                    <div key={item.id} className="flex gap-4 p-3 bg-stone-900 border border-stone-800 rounded-lg">
                      <img src={item.img} alt={item.nome} className="w-20 h-20 object-cover rounded bg-stone-950" />
                      <div className="flex-1 flex flex-col justify-between">
                        <div className="flex justify-between items-start">
                          <h4 className="font-bold text-sm text-stone-200 line-clamp-2 pr-2">{item.nome}</h4>
                          <button onClick={() => handleRemoveFromCart(item.id)} className="text-stone-500 hover:text-red-500 transition-colors">
                            <Trash2 size={16} />
                          </button>
                        </div>
                        <div className="flex justify-between items-center mt-2">
                          <span className="font-bold text-amber-500">{formatarPreco(item.preco * item.qtd)}</span>
                          <div className="flex items-center gap-2 bg-stone-950 border border-stone-800 rounded px-2 py-1">
                            <button onClick={() => handleUpdateQtd(item.id, -1)} className="text-stone-400 hover:text-white"><Minus size={14}/></button>
                            <span className="text-xs font-bold w-4 text-center text-stone-200">{item.qtd}</span>
                            <button onClick={() => handleUpdateQtd(item.id, 1)} className="text-stone-400 hover:text-white"><Plus size={14}/></button>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* Rodapé Carrinho */}
              {cart.length > 0 && (
                <div className="p-6 border-t border-stone-800 bg-stone-900/50">
                  <div className="flex justify-between text-stone-300 mb-2">
                    <span>Subtotal</span>
                    <span>{formatarPreco(cartSubtotal)}</span>
                    <div className="border-t border-stone-800 pt-3 flex justify-between items-center">
                      <span className="font-bold text-stone-200">Total Previsto</span>
                      <span className="font-bold text-xl text-amber-500">{formatarPreco(cartSubtotal)}</span>
                    </div>
                  </div>
                  <a href="checkout.html" className="block text-center w-full bg-amber-700 hover:bg-amber-600 text-white font-bold py-3 rounded-lg transition-colors">
                    Finalizar Compra
                  </a>
                  <a href="perfil.html" className="block text-center mt-4 text-sm text-stone-400 hover:text-stone-200 transition-colors">
                    Ver no Meu Perfil
                  </a>
                </div>
              )}
            </div>
          </div>

          {/* Toast Notification (Pop-up de Adição) */}
          <div className={`fixed bottom-6 right-6 z-50 bg-stone-800 border border-stone-700 text-stone-50 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transition-all duration-300 transform ${toast ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0 pointer-events-none'}`}>
            <CheckCircle size={20} className="text-green-500" />
            <span className="font-medium text-sm">{toast}</span>
          </div>

          {/* Hero Section */}
          <section className="relative px-6 py-24 md:py-32 flex flex-col items-center text-center overflow-hidden border-b border-stone-800">
            <div className="absolute inset-0 bg-stone-900/50"></div>
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full max-w-3xl bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-amber-900/20 via-stone-950/0 to-transparent pointer-events-none"></div>
            
            <div className="relative z-10 max-w-4xl mx-auto">
              <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 text-stone-50">
                Materializamos ideias com <br className="hidden md:block"/>
                <span className="text-amber-600">precisão em 3D.</span>
              </h1>
              <p className="text-stone-400 text-lg md:text-xl mb-10 max-w-2xl mx-auto">
                De itens decorativos exclusivos para sua casa a lotes de brindes corporativos para sua empresa. Qualidade estrutural e acabamento refinado.
              </p>
              
              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="catalogo.html" className="bg-stone-800 hover:bg-stone-700 text-stone-50 px-8 py-3 rounded font-bold transition-colors border border-stone-700 flex items-center justify-center gap-2">
                  Ver Catálogo
                </a>
                <a href="#solucoes-empresariais" className="bg-amber-700 hover:bg-amber-600 text-stone-50 px-8 py-3 rounded font-bold transition-colors shadow-[0_0_15px_rgba(180,83,9,0.4)] flex items-center justify-center gap-2">
                  Projetos Especiais <ArrowRight size={18} />
                </a>
              </div>
            </div>
          </section>

          {/* Destaques Carrossel */}
          <section id="destaques" className="px-6 py-16 bg-stone-900 border-b border-stone-800">
            <div className="max-w-7xl mx-auto">
              <div className="flex justify-between items-end mb-8">
                <div>
                  <h2 className="text-2xl md:text-3xl font-bold text-stone-50">Mais Vendidos</h2>
                  <p className="text-stone-400 mt-1">Os queridinhos da nossa loja.</p>
                </div>
                <div className="hidden md:flex gap-2">
                  <button className="w-10 h-10 rounded-full border border-stone-700 flex items-center justify-center text-stone-400 hover:text-stone-50 hover:bg-stone-800 transition-colors" onClick={() => {document.getElementById('carrossel').scrollBy({left: -300, behavior: 'smooth'})}}>
                    <ChevronRight size={20} className="rotate-180" />
                  </button>
                  <button className="w-10 h-10 rounded-full border border-stone-700 flex items-center justify-center text-stone-400 hover:text-stone-50 hover:bg-stone-800 transition-colors" onClick={() => {document.getElementById('carrossel').scrollBy({left: 300, behavior: 'smooth'})}}>
                    <ChevronRight size={20} />
                  </button>
                </div>
              </div>

              <div id="carrossel" className="flex overflow-x-auto snap-x snap-mandatory gap-6 pb-6 -mx-6 px-6 md:mx-0 md:px-0 scrollbar-hide">
                {previewProdutos.map((produto) => (
                  <div key={produto.id} className="snap-start min-w-[260px] md:min-w-[280px] bg-stone-950 rounded-lg border border-stone-800 overflow-hidden group flex-shrink-0 hover:border-amber-700/30 transition-colors flex flex-col">
                    <div className="aspect-square bg-stone-900 relative flex items-center justify-center border-b border-stone-800 overflow-hidden">
                      <img src={produto.img} alt={produto.nome} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-50 group-hover:opacity-80" />
                      <div className="absolute top-3 left-3 bg-amber-900/80 text-amber-100 text-xs font-bold px-2 py-1 rounded border border-amber-700">
                        Mais Vendido
                      </div>
                    </div>
                    <div className="p-5 flex-1 flex flex-col justify-between">
                      <h3 className="font-semibold text-lg text-stone-100 mb-4 line-clamp-2">{produto.nome}</h3>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-xl text-amber-500">{formatarPreco(produto.preco)}</span>
                        <button onClick={() => handleAddToCart(produto)} className="text-stone-50 bg-stone-800 hover:bg-amber-700 px-3 py-1.5 rounded text-sm font-medium transition-colors">
                          Adicionar
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Diferenciais */}
          <section id="diferencial" className="px-6 py-20 bg-stone-950 border-b border-stone-800">
            <div className="max-w-7xl mx-auto">
              <div className="text-center mb-16">
                <h2 className="text-3xl font-bold text-stone-50">Por que a 2LN 3D?</h2>
                <p className="text-stone-400 mt-2 max-w-2xl mx-auto">Impressão 3D levada a sério. Focamos na qualidade do material e na resistência da sua peça.</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div className="bg-stone-900 p-8 rounded-xl border border-stone-800 text-center flex flex-col items-center">
                  <div className="w-14 h-14 bg-amber-900/30 text-amber-500 rounded-full flex items-center justify-center mb-5 border border-amber-900/50">
                    <ShieldCheck size={28} />
                  </div>
                  <h3 className="font-bold text-xl mb-3 text-stone-50">Acabamento Premium</h3>
