<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - 2LN 3D</title>
  <link rel="icon" href="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" type="image/jpeg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans selection:bg-amber-700 selection:text-white min-h-screen flex flex-col">
  
  <div id="root" class="flex-1 flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const ShieldCheck = (p) => <IconWrapper {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const ArrowLeft = (p) => <IconWrapper {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></IconWrapper>;
    const CreditCard = (p) => <IconWrapper {...p}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></IconWrapper>;
    const MapPin = (p) => <IconWrapper {...p}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Package = (p) => <IconWrapper {...p}><line x1="16.5" x2="7.5" y1="9.4" y2="14.6"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></IconWrapper>;

    const InputField = ({ label, type = "text", placeholder, defaultValue, disabled = false }) => (
      <div className="flex flex-col gap-1.5">
        <label className="text-sm font-medium text-stone-400">{label}</label>
        <input 
          type={type} 
          placeholder={placeholder} 
          defaultValue={defaultValue}
          disabled={disabled}
          className={`bg-stone-900 border border-stone-800 text-stone-200 rounded-lg p-3 outline-none transition-all ${disabled ? 'opacity-60 cursor-not-allowed' : 'focus:border-amber-600 focus:ring-1 focus:ring-amber-600'}`}
        />
      </div>
    );

    function App() {
      const [cart, setCart] = useState([]);
      const [userData, setUserData] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [frete, setFrete] = useState(0);
      const [cep, setCep] = useState('');
      const [cupom, setCupom] = useState('');
      const [desconto, setDesconto] = useState(0);

      useEffect(() => {
        // Carrega dados do carrinho e utilizador
        try {
          const savedCart = localStorage.getItem('2ln_cart');
          if (savedCart) setCart(JSON.parse(savedCart));

          const savedUser = localStorage.getItem('2ln_userData');
          if (savedUser) setUserData(JSON.parse(savedUser));
        } catch (error) {
          console.warn("Falha ao aceder ao localStorage.", error);
        } finally {
          setIsLoading(false);
        }
      }, []);

      const formatarPreco = (valor) => `R$ ${valor.toFixed(2).replace('.', ',')}`;
      
      const subtotal = cart.reduce((acc, item) => acc + (item.preco * item.qtd), 0);
      const total = subtotal + frete - desconto;

      const calcularFrete = () => {
        if (cep.length >= 8) {
          // Simulação de cálculo de frete
          setFrete(25.90);
        }
      };

      const aplicarCupom = () => {
        if (cupom.toUpperCase() === 'BEMVINDO10') {
          setDesconto(subtotal * 0.10); // 10% desconto
        } else {
          setDesconto(0);
          alert('Cupão inválido.');
        }
      };

      if (isLoading) return null;

      if (cart.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
            <Package size={48} className="text-stone-500 mb-4 opacity-50" />
            <h2 className="text-2xl font-bold text-stone-50 mb-2">Checkout Indisponível</h2>
            <p className="text-stone-400 mb-6">O seu carrinho está vazio.</p>
            <a href="catalogo.html" className="bg-amber-700 hover:bg-amber-600 text-stone-50 px-8 py-3 rounded-lg font-bold transition-colors">
              Ir para o Catálogo
            </a>
          </div>
        );
      }

      return (
        <React.Fragment>
          {/* Header Checkout Simplificado */}
          <header className="bg-stone-950 border-b border-stone-800 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div className="max-w-7xl mx-auto w-full flex items-center justify-between">
              <a href="javascript:history.back()" className="text-stone-400 hover:text-stone-200 transition-colors flex items-center gap-2 text-sm font-medium">
                <ArrowLeft size={16} /> Voltar
              </a>
              <img 
                src="assest/WhatsApp Image 2026-07-08 at 12.15.52.jpeg" 
                alt="2LN 3D Logo" 
                className="h-10 w-auto object-contain mix-blend-screen"
                onError={(e) => {
                  e.target.onerror = null; 
                  e.target.src = "https://placehold.co/100x40/292524/a8a29e?text=2LN";
                }}
              />
              <div className="flex items-center gap-2 text-green-500 text-sm font-medium">
                <ShieldCheck size={16} /> <span className="hidden sm:inline">Checkout Seguro</span>
              </div>
            </div>
          </header>

          <main className="flex-1 bg-stone-900 py-8 md:py-12 px-4 sm:px-6">
            <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
              
              {/* Coluna Esquerda: Formulários */}
              <div className="flex-1 space-y-6">
                
                {/* 1. Dados Pessoais */}
                <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 md:p-8 shadow-lg">
                  <div className="flex items-center gap-3 mb-6 border-b border-stone-800 pb-4">
                    <div className="w-8 h-8 rounded-full bg-amber-900/30 text-amber-500 flex items-center justify-center font-bold text-sm border border-amber-700/50">1</div>
                    <h2 className="text-xl font-bold text-stone-50">Dados Pessoais</h2>
                  </div>
                  
                  {!userData ? (
                    <div className="bg-stone-900 border border-stone-800 rounded-lg p-5 flex flex-col sm:flex-row justify-between items-center gap-4">
                      <div>
                        <p className="font-bold text-stone-200">Já tem conta?</p>
                        <p className="text-sm text-stone-400">Faça login para carregar os seus dados mais rapidamente.</p>
                      </div>
                      <a href="login.html" className="bg-stone-800 hover:bg-stone-700 text-stone-50 px-6 py-2 rounded-lg font-medium transition-colors border border-stone-700 w-full sm:w-auto text-center">
                        Iniciar Sessão
                      </a>
                    </div>
                  ) : null}

                  <div className={`grid grid-cols-1 md:grid-cols-2 gap-5 ${!userData ? 'mt-6' : ''}`}>
                    <InputField label="Nome Completo" defaultValue={userData?.nome || ''} />
                    <InputField label="CPF / CNPJ" placeholder="000.000.000-00" />
                    <InputField label="E-mail" type="email" defaultValue={userData?.email || ''} />
                    <InputField label="Telefone / WhatsApp" placeholder="(00) 90000-0000" />
                  </div>
                </div>

                {/* 2. Entrega */}
                <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 md:p-8 shadow-lg">
                  <div className="flex items-center gap-3 mb-6 border-b border-stone-800 pb-4">
                    <div className="w-8 h-8 rounded-full bg-amber-900/30 text-amber-500 flex items-center justify-center font-bold text-sm border border-amber-700/50">2</div>
                    <h2 className="text-xl font-bold text-stone-50">Endereço de Entrega</h2>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                    <div className="flex flex-col gap-1.5 md:col-span-1">
                      <label className="text-sm font-medium text-stone-400">CEP</label>
                      <div className="flex gap-2">
                        <input 
                          type="text" 
                          placeholder="00000-000" 
                          value={cep}
                          onChange={(e) => setCep(e.target.value)}
                          className="w-full bg-stone-900 border border-stone-800 text-stone-200 rounded-lg p-3 outline-none focus:border-amber-600"
                        />
                        <button onClick={calcularFrete} className="bg-stone-800 hover:bg-stone-700 text-stone-300 px-4 rounded-lg font-medium transition-colors border border-stone-700">
                          OK
                        </button>
                      </div>
                    </div>
                    
                    <div className="md:col-span-2"><InputField label="Logradouro" placeholder="Avenida / Rua" /></div>
                    <InputField label="Número" />
                    <InputField label="Complemento" placeholder="Opcional" />
                    <InputField label="Bairro" />
                    <div className="md:col-span-2"><InputField label="Cidade" /></div>
                    <InputField label="Estado" />
                  </div>
                </div>

                {/* 3. Pagamento (Visual Mock) */}
                <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 md:p-8 shadow-lg opacity-50 pointer-events-none relative">
                  <div className="absolute inset-0 z-10 flex items-center justify-center backdrop-blur-[1px]">
                    <div className="bg-stone-900 border border-stone-700 px-4 py-2 rounded-lg text-sm font-bold text-stone-300 shadow-xl">
                      Preencha os dados acima primeiro
                    </div>
                  </div>
                  <div className="flex items-center gap-3 mb-6 border-b border-stone-800 pb-4">
                    <div className="w-8 h-8 rounded-full bg-stone-800 text-stone-500 flex items-center justify-center font-bold text-sm">3</div>
                    <h2 className="text-xl font-bold text-stone-50">Pagamento</h2>
                  </div>
                  <div className="flex gap-4 mb-6">
                    <div className="flex-1 bg-stone-900 border border-stone-700 rounded-lg p-4 flex flex-col items-center justify-center gap-2 cursor-pointer">
                      <CreditCard size={24} className="text-stone-400" />
                      <span className="text-sm font-medium">Cartão</span>
                    </div>
                    <div className="flex-1 bg-stone-900 border border-stone-800 rounded-lg p-4 flex flex-col items-center justify-center gap-2 cursor-pointer">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 17L12 22L22 17" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 12L12 17L22 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      <span className="text-sm font-medium text-stone-500">Pix</span>
                    </div>
                  </div>
                </div>

              </div>

              {/* Coluna Direita: Resumo do Pedido */}
              <div className="w-full lg:w-96 flex-shrink-0">
                <div className="bg-stone-950 border border-stone-800 rounded-xl p-6 lg:sticky lg:top-24 shadow-xl">
                  <h3 className="font-bold text-lg text-stone-50 mb-4 border-b border-stone-800 pb-4 flex items-center gap-2">
                    <Package size={20} className="text-amber-500"/> Resumo do Pedido
                  </h3>
                  
                  {/* Lista de Itens (Compacta) */}
                  <div className="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2 scrollbar-hide">
                    {cart.map(item => (
                      <div key={item.id} className="flex gap-3">
                        <div className="w-16 h-16 bg-stone-900 rounded border border-stone-800 overflow-hidden flex-shrink-0 relative">
                          <img src={item.img} alt={item.nome} className="w-full h-full object-cover opacity-80" />
                          <span className="absolute -top-1 -right-1 bg-stone-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{item.qtd}</span>
                        </div>
                        <div className="flex-1 flex flex-col justify-center">
                          <h4 className="text-sm font-medium text-stone-300 line-clamp-2 leading-tight">{item.nome}</h4>
                          <span className="text-sm font-bold text-amber-500 mt-1">{formatarPreco(item.preco * item.qtd)}</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Cupão */}
                  <div className="mb-6 pt-4 border-t border-stone-800">
                    <label className="text-xs font-medium text-stone-400 mb-1.5 block">Possui um cupão?</label>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        placeholder="Insira o código" 
                        value={cupom}
                        onChange={(e) => setCupom(e.target.value)}
                        className="w-full bg-stone-900 border border-stone-800 text-stone-200 text-sm rounded-lg px-3 py-2 outline-none focus:border-amber-600"
                      />
                      <button onClick={aplicarCupom} className="bg-stone-800 hover:bg-stone-700 text-stone-300 px-4 py-2 rounded-lg text-sm font-bold transition-colors border border-stone-700">
                        Aplicar
                      </button>
                    </div>
                  </div>

                  {/* Totais */}
                  <div className="space-y-3 mb-6 pt-4 border-t border-stone-800">
                    <div className="flex justify-between text-stone-400 text-sm">
                      <span>Subtotal</span>
                      <span>{formatarPreco(subtotal)}</span>
                    </div>
                    {desconto > 0 && (
                      <div className="flex justify-between text-green-500 text-sm font-medium">
                        <span>Desconto</span>
                        <span>- {formatarPreco(desconto)}</span>
                      </div>
                    )}
                    <div className="flex justify-between text-stone-400 text-sm">
                      <span>Frete</span>
                      <span>{frete === 0 ? 'A calcular' : formatarPreco(frete)}</span>
                    </div>
                    <div className="border-t border-stone-800 pt-3 flex justify-between items-center">
                      <span className="font-bold text-stone-200">Total</span>
                      <span className="font-bold text-2xl text-amber-500">{formatarPreco(total)}</span>
                    </div>
                  </div>

                  <button className="w-full bg-amber-700 hover:bg-amber-600 text-stone-50 py-4 rounded-lg font-bold text-lg transition-colors shadow-[0_0_15px_rgba(180,83,9,0.3)]">
                    Confirmar Pedido
                  </button>

                  <div className="mt-4 flex items-center justify-center gap-2 text-xs text-stone-500">
                    <ShieldCheck size={14} /> Transação criptografada e segura.
                  </div>
                </div>
              </div>
            </div>
          </main>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
